<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ImpactSync | Volunteer Coordination</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', secondary: '#4338ca', accent: '#e0e7ff' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 font-sans text-slate-800 h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
        <div class="flex items-center gap-2">
            <div class="bg-primary text-white p-2 rounded-lg"><i class="fa-solid fa-hands-holding-circle"></i></div>
            <h1 class="text-xl font-bold text-slate-900">ImpactSync</h1>
        </div>
        <div class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
            Smart Resource Allocation
        </div>
    </header>

    <main class="flex-1 overflow-auto p-6">
        <div class="max-w-7xl mx-auto space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-blue-100 text-blue-600 p-4 rounded-full text-xl"><i class="fa-solid fa-list-check"></i></div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium">Total Needs Posted</p>
                        <p class="text-2xl font-bold text-slate-900" id="statTotal">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-green-100 text-green-600 p-4 rounded-full text-xl"><i class="fa-solid fa-user-check"></i></div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium">Tasks Claimed</p>
                        <p class="text-2xl font-bold text-slate-900" id="statClaimed">0</p>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm flex items-center gap-4">
                    <div class="bg-purple-100 text-purple-600 p-4 rounded-full text-xl"><i class="fa-solid fa-clock"></i></div>
                    <div>
                        <p class="text-sm text-slate-500 font-medium">Impact Hours Allocated</p>
                        <p class="text-2xl font-bold text-slate-900" id="statHours">0</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6">
                        <h2 class="text-lg font-bold mb-4 border-b pb-2">Allocate Resource Need</h2>
                        <form id="taskForm" class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Task Description</label>
                                <input type="text" id="taskTitle" required placeholder="e.g., Downtown Cleanup" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1">Category</label>
                                    <select id="taskCategory" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                                        <option value="Environment">Environment</option>
                                        <option value="Education">Education</option>
                                        <option value="Logistics">Logistics</option>
                                        <option value="Health">Health</option>
                                    </select>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium mb-1">Est. Hours</label>
                                    <input type="number" id="taskHours" required min="1" max="24" placeholder="Hrs" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-primary focus:outline-none">
                                </div>
                            </div>
                            <button type="submit" class="w-full bg-primary hover:bg-secondary text-white font-medium py-2 rounded-lg transition">
                                Post Volunteer Need
                            </button>
                        </form>
                        <button id="resetApp" class="w-full mt-4 text-sm text-red-500 hover:text-red-700 font-medium py-2">
                            <i class="fa-solid fa-trash-can mr-1"></i> Reset Dashboard Data
                        </button>
                    </div>
                </div>

                <div class="lg:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[500px]">
                        <h2 class="text-lg font-bold mb-4 border-b pb-2 text-slate-800"><i class="fa-solid fa-inbox text-blue-500 mr-2"></i>Open Needs</h2>
                        <div id="openTasks" class="flex-1 overflow-y-auto space-y-3 pr-2">
                            </div>
                    </div>

                    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 flex flex-col h-[500px]">
                        <h2 class="text-lg font-bold mb-4 border-b pb-2 text-slate-800"><i class="fa-solid fa-clipboard-check text-green-500 mr-2"></i>Resources Allocated</h2>
                        <div id="claimedTasks" class="flex-1 overflow-y-auto space-y-3 pr-2">
                            </div>
                    </div>

                </div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
